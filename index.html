<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강동길동매일365한의원 경영 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">강동길동매일365한의원</p>
        <h1>원장별 실적 경영 대시보드</h1>
      </div>
      <div class="sync-panel">
        <span id="syncStatus" class="status-dot">연결 대기</span>
        <button id="refreshButton" class="icon-button" type="button" title="새로고침" aria-label="새로고침">
          ↻
        </button>
      </div>
    </header>

    <nav class="tabs" aria-label="대시보드 메뉴">
      <button class="tab is-active" data-tab="overview" type="button">전체</button>
      <button class="tab" data-tab="doctors" type="button">원장별</button>
      <button class="tab" data-tab="timeline" type="button">시계열</button>
      <button class="tab" data-tab="segments" type="button">분류/패키지</button>
      <button class="tab" data-tab="comparison" type="button">비교</button>
      <button class="tab" data-tab="daily" type="button">일자 분석</button>
      <button class="tab" data-tab="records" type="button">상세</button>
      <button class="tab" data-tab="settings" type="button">연동</button>
    </nav>

    <main>
      <section class="filter-strip" aria-label="필터">
        <label>
          <span>시작일</span>
          <input id="startDate" type="date" />
        </label>
        <label>
          <span>종료일</span>
          <input id="endDate" type="date" />
        </label>
        <label>
          <span>원장</span>
          <select id="doctorFilter"></select>
        </label>
        <label>
          <span>분류</span>
          <select id="categoryFilter"></select>
        </label>
        <label>
          <span>패키지명</span>
          <select id="packageFilter"></select>
        </label>
        <label>
          <span>단위</span>
          <select id="granularityFilter">
            <option value="day">일별</option>
            <option value="week">주별</option>
            <option value="month" selected>월별</option>
          </select>
        </label>
      </section>

      <section id="overview" class="tab-panel is-active">
        <div class="metric-grid">
          <article class="metric">
            <span>총 매출</span>
            <strong id="totalRevenue">0원</strong>
          </article>
          <article class="metric">
            <span>건수</span>
            <strong id="totalCount">0건</strong>
          </article>
          <article class="metric">
            <span>객단가</span>
            <strong id="averageRevenue">0원</strong>
          </article>
          <article class="metric">
            <span>원장 수</span>
            <strong id="doctorCount">0명</strong>
          </article>
        </div>

        <div class="layout-two">
          <section class="panel">
            <div class="panel-heading">
              <h2>매출 추이</h2>
              <span id="trendCaption"></span>
            </div>
            <div id="trendChart" class="chart chart-line"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>원장별 매출</h2>
              <span id="doctorCaption"></span>
            </div>
            <div id="doctorBars" class="bar-list"></div>
          </section>
        </div>
      </section>

      <section id="doctors" class="tab-panel">
        <section class="panel">
          <div class="panel-heading">
            <h2>원장별 상세</h2>
            <span id="doctorTableCaption"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>원장</th>
                  <th>매출</th>
                  <th>건수</th>
                  <th>객단가</th>
                  <th>비중</th>
                </tr>
              </thead>
              <tbody id="doctorTable"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section id="timeline" class="tab-panel">
        <section class="panel">
          <div class="panel-heading">
            <h2>기간별 매출</h2>
            <span id="timelineCaption"></span>
          </div>
          <div id="timelineChart" class="chart chart-line tall"></div>
        </section>
      </section>

      <section id="segments" class="tab-panel">
        <div class="layout-two">
          <section class="panel">
            <div class="panel-heading">
              <h2>분류별 매출</h2>
              <span id="categoryCaption"></span>
            </div>
            <div id="categoryBars" class="bar-list"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>패키지별 매출</h2>
              <span id="packageCaption"></span>
            </div>
            <div id="packageBars" class="bar-list"></div>
          </section>
        </div>
      </section>

      <section id="comparison" class="tab-panel">
        <div class="layout-two">
          <section class="panel">
            <div class="panel-heading">
              <h2>원장별 기간 비교</h2>
              <span id="comparisonDoctorCaption"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>원장</th>
                    <th class="numeric">현재</th>
                    <th class="numeric">비교</th>
                    <th class="numeric">증감</th>
                    <th class="numeric">% Δ</th>
                  </tr>
                </thead>
                <tbody id="comparisonDoctorTable"></tbody>
              </table>
            </div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>패키지별 기간 비교</h2>
              <span id="comparisonPackageCaption"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>패키지명</th>
                    <th class="numeric">현재</th>
                    <th class="numeric">비교</th>
                    <th class="numeric">증감</th>
                    <th class="numeric">% Δ</th>
                  </tr>
                </thead>
                <tbody id="comparisonPackageTable"></tbody>
              </table>
            </div>
          </section>
        </div>
        <section class="panel detail-panel">
          <div class="panel-heading">
            <h2 id="selectedPackageTitle">패키지 결제 내역</h2>
            <button id="clearPackageSelection" class="secondary-button compact" type="button">전체 보기</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="packageDetailHead"></thead>
              <tbody id="packageDetailBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section id="daily" class="tab-panel">
        <div class="layout-two">
          <section class="panel">
            <div class="panel-heading">
              <h2>일자별 원장 매출</h2>
              <span id="dailyDoctorCaption"></span>
            </div>
            <div id="dailyDoctorChart" class="chart chart-line tall"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>원장별 분류 매출</h2>
              <span id="doctorCategoryCaption"></span>
            </div>
            <div id="doctorCategoryChart" class="chart chart-line tall"></div>
          </section>
        </div>
      </section>

      <section id="records" class="tab-panel">
        <section class="panel">
          <div class="panel-heading">
            <h2>상세 내역</h2>
            <span id="recordCaption"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="recordHead"></thead>
              <tbody id="recordBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section id="settings" class="tab-panel">
        <section class="panel settings-panel">
          <div class="panel-heading">
            <h2>구글시트 연동</h2>
            <span id="configCaption"></span>
          </div>
          <div class="settings-grid">
            <label>
              <span>API 키</span>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="AIza..." />
            </label>
            <label>
              <span>스프레드시트 ID</span>
              <input id="spreadsheetIdInput" type="text" />
            </label>
            <label>
              <span>gid</span>
              <input id="gidInput" type="text" />
            </label>
            <label>
              <span>시트명</span>
              <input id="sheetNameInput" type="text" placeholder="비워두면 gid로 자동 확인" />
            </label>
            <label>
              <span>범위</span>
              <input id="rangeInput" type="text" value="A:Z" />
            </label>
            <label>
              <span>날짜 열</span>
              <select id="dateColumnInput"></select>
            </label>
            <label>
              <span>원장 열</span>
              <select id="doctorColumnInput"></select>
            </label>
            <label>
              <span>분류 열</span>
              <select id="categoryColumnInput"></select>
            </label>
            <label>
              <span>패키지명 열</span>
              <select id="packageColumnInput"></select>
            </label>
            <label>
              <span>금액 열</span>
              <select id="amountColumnInput"></select>
            </label>
          </div>
          <div class="settings-actions">
            <button id="saveConfigButton" class="primary-button" type="button">저장</button>
            <button id="clearConfigButton" class="secondary-button" type="button">초기화</button>
          </div>
        </section>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">표시할 데이터가 없습니다.</div>
    </template>

    <script src="./config.js"></script>
    <script src="./app.js?v=20260702-compare"></script>
  </body>
</html>
